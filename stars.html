<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars | AstroGate</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>

    <div class="overlay">

        <img src="img/logo2.png" class="corner-logo" alt="AstroGate Logo">

        <div class="intro-text">
            <h1>Explore The Stars</h1>
            <p>Choose your cosmic destination</p>
        </div>

        <section class="stars-space">

            <div class="star star1" onclick="transitionTo('sirius-details.html')">
                <img src="img/star1.jpeg" alt="Sirius">
                <span>Sirius</span>
            </div>

            <div class="star star2" onclick="transitionTo('arcturus-details.html')">
                <img src="img/star2.jpeg" alt="Canopus">
                <span>Canopus</span>
            </div>

            <div class="star star3" onclick="transitionTo('alcor-details.html')">
                <img src="img/star3.jpeg" alt="Alcor">
                <span>Alcor</span>
            </div>

            <div class="star star4" onclick="transitionTo('mizar-details.html')">
                <img src="img/star4.jpeg" alt="Mizar">
                <span>Mizar</span>
            </div>

            <div class="star star5" onclick="transitionTo('canopus-details.html')">
                <img src="img/star5.jpeg" alt="Arcturus">
                <span>Arcturus</span>
            </div>

        </section>

    </div>

    <script src="script.js"></script>
</body>

</html>
