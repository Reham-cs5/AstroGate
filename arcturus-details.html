<!DOCTYPE html>

</head>

        <div class="details-container">

            </div>

            <div class="details-text">

                <p>
                    Arcturus is a giant glowing star that offers
                    an exciting luxury journey across the universe.
                </p>

                <ul>
                    <li><strong>Duration:</strong> 9 Days</li>

                    <li><strong>Transportation:</strong> Premium Space Jet</li>
                    <li><strong>Activities:</strong> Cosmic adventures, galaxy tours, space camping</li>
                </ul>

                <button class="book-btn" onclick="transitionTo('booking.html')">

                </button>

                <button class="back-btn" onclick="transitionTo('stars.html')">
