<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alcor Details</title>

    <link rel="stylesheet" href="star-details.css">
</head>

<body>

    <div class="overlay">

        <img src="img/logo2.png" alt="AstroGate Logo" class="corner-logo">

        <div class="details-container">

            <div class="star-image">

                <img src="img/star3.jpeg" alt="Alcor">

            </div>

            <div class="details-text">

                <h1>Alcor</h1>

                <p>
                    Alcor is a mysterious star destination filled
                    with breathtaking cosmic views and deep-space adventures.
                </p>

                <ul>
                    <li><strong>Duration:</strong> 5 Days</li>
                    <li><strong>Price:</strong> $10,500</li>
                    <li><strong>Transportation:</strong> Space Shuttle</li>
                    <li><strong>Activities:</strong> Cosmic tours, stargazing, photography</li>
                </ul>

                <button class="book-btn" onclick="transitionTo('booking.html')">
                    Book This Trip
                </button>

                <button class="back-btn" onclick="transitionTo('stars.html')">
                    Back to Stars
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
