<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planets | AstroGate</title>
    <link rel="stylesheet" href="planets.css">
</head>

<body>

    <div class="overlay">

        <img src="img/logo2.png" alt="AstroGate Logo" class="corner-logo">

        <div class="intro-text">
            <h1>Explore the Planets</h1>
            <p>Click on any planet to begin your journey</p>
        </div>

       <section class="planets-space">

    <div class="planet planet1" onclick="goToPlanet('Mercury')">
        <img src="img/nasa-N3BQHYOVq5E-unsplash-removebg-preview.png" alt="Mercury">
        <span>Mercury</span>
    </div>

    <div class="planet planet2" onclick="goToPlanet('Venus')">
        <img src="img/Did_you_know__A_day_on_venus_is_longer_than_its_year___-removebg-preview.png" alt="Venus">
        <span>Venus</span>
    </div>

  

    <div class="planet planet4" onclick="goToPlanet('Mars')">
        <img src="img/There_s_no_other_planet_in_the_Solar_System_that_is_redder_than_Mars__the_red_planet__-removebg-preview.png" alt="Mars">
        <span>Mars</span>
    </div>

    <div class="planet planet5" onclick="goToPlanet('Jupiter')">
        <img src="img/Planets-removebg-preview.png" alt="Jupiter">
        <span>Jupiter</span>
    </div>

    <div class="planet planet6" onclick="goToPlanet('Saturn')">
        <img src="img/Saturne.jpg" alt="Saturn">
        <span>Saturn</span>
    </div>

    <div class="planet planet7" onclick="goToPlanet('Uranus')">
        <img src="img/Uranus.png" alt="Uranus">
        <span>Uranus</span>
    </div>

    <div class="planet planet8" onclick="goToPlanet('Neptune')">
        <img src="img/Neptune.png" alt="Neptune">
        <span>Neptune</span>
    </div>

</section>
    </div>

    <script src="script.js"></script>
</body>
</html>
